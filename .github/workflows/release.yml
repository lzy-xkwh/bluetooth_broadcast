name: Release APK

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform and build tools
        run: sdkmanager "platforms;android-23" "build-tools;28.0.3"

      - name: Build APK
        env:
          ANDROID_JAR: ${{ env.ANDROID_HOME }}/platforms/android-23/android.jar
          BUILD_TOOLS: ${{ env.ANDROID_HOME }}/build-tools/28.0.3
        run: ./build_minimal.sh

      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: |
            build/apk/poersmart-car-key.apk
            build/apk/poersmart-car-key.apk.sha256
